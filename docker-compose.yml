services:
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: rag, POSTGRES_PASSWORD: rag, POSTGRES_DB: rag}
    ports: ["5432:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U rag"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10}
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports: ["6333:6333"]
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ':9001'
    environment: {MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin}
    ports: ["9000:9000", "9001:9001"]
  api:
    build: {context: ., dockerfile: infrastructure/docker/api.Dockerfile}
    env_file: .env
    ports: ["8000:8000"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_healthy}, qdrant: {condition: service_started}, minio: {condition: service_started}}
  worker:
    build: {context: ., dockerfile: infrastructure/docker/worker.Dockerfile}
    env_file: .env
    depends_on: {api: {condition: service_started}, redis: {condition: service_healthy}}
  web:
    build: {context: ., dockerfile: infrastructure/docker/web.Dockerfile}
    environment: {NEXT_PUBLIC_API_URL: http://localhost:8000}
    ports: ["3000:3000"]
    depends_on: [api]
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes: ["./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
  ollama:
    image: ollama/ollama:latest
    profiles: ['ollama']
    ports: ["11434:11434"]
